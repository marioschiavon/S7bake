version: '3.8'

services:
  s7bake:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Passar essas variáveis no Dockploy (seção Build Args ou Variables)
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: s7bake-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.s7bake.rule=Host(`bake.s7cloud.com.br`)"
      - "traefik.http.routers.s7bake.entrypoints=websecure"
      - "traefik.http.routers.s7bake.tls.certresolver=letsencrypt"
      - "traefik.http.services.s7bake.loadbalancer.server.port=80"
      - "traefik.docker.network=dokploy-network"

networks:
  dokploy-network:
    external: true
